# Finance ETL Pipeline Configuration
# This is an example configuration file - replace placeholder values with your own

[common]
# AWS Settings
code_region=us-west-2
glue_iam_role=arn:aws:iam::YOUR_ACCOUNT_ID:role/service-role/AWSGlueServiceRole

# S3 Buckets (replace YOUR_ACCOUNT_ID with actual account ID)
source_bucketname=datalake-dev-us-west-2-YOUR_ACCOUNT_ID
destination_bucketname=datalake-nonpii-dev-us-west-2-YOUR_ACCOUNT_ID
finance_bucketname=aws-athena-scratch-finance-YOUR_ACCOUNT_ID-us-west-2
code_bucket_name=datalake-code-dev-us-west-2-YOUR_ACCOUNT_ID

# Paths
sql_file_path=finance/code-bucket/scripts/sql/prod
parquet_path=finance/monthly_revenue_reports
internal_outbound_path=internal/outbound/MonthlyRevenueReports

# External data source paths
vcard_northcard_src_path=internal/inbound/MonthlyRevenueReports/NorthCard
vcard_fleetpay_src_path=external/inbound/MonthlyRevenueReports/fleetpay-direct
adyen_src_path=internal/inbound/MonthlyRevenueReports/Adyen

# Database names
nopii_db=bdc_finance
datalake_nopii_db=bdc_nopii

# Output Settings
output_delim=|
header=true
output_format=parquet
no_of_partitions=1

# Business Day Table Lists
# Jobs are scheduled to run on specific business days of the month
day1_tables_list=monthly_rpt_cash_billed_revenue,monthly_rpt_creditcard_refunds
day2_tables_list=monthly_rpt_unbilled_revenue
day3_tables_list=monthly_rpt_international_revenue,monthly_rpt_canadian_revenue
day4_tables_list=monthly_rpt_contract_usage_revenue

# ============================================================================
# Per-Table Configuration
# Format: {table_name}_{property}={value}
# ============================================================================

# Cash Billed Revenue Report
monthly_rpt_cash_billed_revenue_partition_column=None
monthly_rpt_cash_billed_revenue_report=Monthly
monthly_rpt_cash_billed_revenue_sql=monthly_rpt_cash_billed_revenue_v2

# Unbilled Revenue Report
monthly_rpt_unbilled_revenue_partition_column=None
monthly_rpt_unbilled_revenue_report=Monthly
monthly_rpt_unbilled_revenue_sql=monthly_rpt_unbilled_revenue_v1

# International Revenue Report
monthly_rpt_international_revenue_partition_column=None
monthly_rpt_international_revenue_report=Monthly
monthly_rpt_international_revenue_sql=monthly_rpt_international_revenue_v3

# Canadian Revenue Report
monthly_rpt_canadian_revenue_partition_column=None
monthly_rpt_canadian_revenue_report=Monthly
monthly_rpt_canadian_revenue_sql=monthly_rpt_canadian_revenue_v1

# Credit Card Refunds Report
monthly_rpt_creditcard_refunds_partition_column=None
monthly_rpt_creditcard_refunds_report=Monthly
monthly_rpt_creditcard_refunds_sql=monthly_rpt_creditcard_refunds_v1

# Contract Usage Revenue Report
monthly_rpt_contract_usage_revenue_partition_column=None
monthly_rpt_contract_usage_revenue_report=Monthly
monthly_rpt_contract_usage_revenue_sql=monthly_rpt_contract_usage_revenue_v1

# ============================================================================
# External File Schemas (for CSV transforms)
# ============================================================================

# NorthCard VCard schema mapping
# Format: [(source_col, source_type, target_col, target_type), ...]
# PARTIAL: these values continue beyond the right edge of the supplied screenshot.
northcard_columns=program,batch_number,transaction_token,post_date,transaction_status,acting_user...
northcard_schema=[("program","string","program","string"),("batch_number","string","batch_number",...)]

# FleetPay VCard schema mapping
# PARTIAL: these values continue beyond the right edge of the supplied screenshot.
fleetpay_columns=Year,Month,Day,Account,CustID,Card Last 4,Token,Merchant Name,MCC,Spend,Net IC...
fleetpay_schema=[("Year","string","Year","int"),("Month","string","Month","int"),("Day","string",...)]

